name: mini_katalog
description: "Mini Katalog Uygulaması - Flutter ile geliştirilmiş e-ticaret katalog uygulaması. FakeStore API üzerinden ürün listeler, arama/filtreleme, favori ve sepet yönetimi sunar."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
